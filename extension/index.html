<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            width: 400px;
            justify-content: center;
            align-items: center;
            padding-bottom: 17px;
        }
        button{
            width: 200px;
        border: 2px solid #77bcdbcf;
        background: #00ff5c54;
        height: 25px;
        border-radius: 7px;
        cursor: pointer;
        
        }
        .loader-container {
            display: none;
            flex-direction: hidden;
            align-items: center;
            justify-content: center;
            
            background-color: #f8f9fa;
        }

        /* Loader Animation */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Keyframes for spinning effect */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Loading text */
        .loading-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

    </style>
</head>
<body>
    <h1>Welcome to BiasChecker</h1>
    <h3>Click on button below to get bias analysis and bias free article</h1>

    <button id = "detectButton"> Detect Bias </button>
    <!-- <button id = "sticky-button" style="display: none;">Insert into Tab</button> -->
    <div class="loader-container">
        <div class="loader"></div>
        <p class="loading-text">Please wait a few seconds...</p>
    </div>
</body>

<script src = "script.js"></script>
</html>
